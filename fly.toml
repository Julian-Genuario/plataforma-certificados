app = 'plataforma-certificados'
primary_region = 'scl'

[build]

[env]
  DJANGO_DEBUG = 'False'
  DJANGO_ALLOWED_HOSTS = '.fly.dev'
  PYTHON_VERSION = '3.12.3'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>{{ event.name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body style="font-family: Arial; max-width: 520px; margin: 40px auto;">
  <h2>{{ event.name }}</h2>

  <form method="post" action="{% url 'download_certificate' event.slug %}">
    {% csrf_token %}
    <label>Nombre y apellido</label><br/>
    <input name="full_name" required style="width:100%; padding:10px; margin:10px 0; font-size:16px;" />
    <button type="submit" style="padding:10px 14px; font-size:16px;">Descargar certificado</button>
  </form>
</body>
</html>
